<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Custom AI Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Custom AI Chat</div>
      <div class="meta" id="meta" title="サーバーの .env で設定">読み込み中…</div>
      <button id="clear" class="ghost" type="button">クリア</button>
    </header>

    <main id="thread" class="thread" aria-live="polite">
      <div class="empty" id="empty">
        <h1>何でも聞いてください</h1>
        <p>BASE_URL / MODEL / API_KEY はサーバーの <code>.env</code> で切り替えられます。</p>
      </div>
    </main>

    <form id="composer" class="composer">
      <div class="composer-inner">
        <textarea
          id="input"
          rows="1"
          placeholder="メッセージを入力…（Enterで送信 / Shift+Enterで改行）"
          autofocus
        ></textarea>
        <button id="send" type="submit" title="送信">送信</button>
      </div>
    </form>

    <script type="module" src="/app.js"></script>
  </body>
</html>
